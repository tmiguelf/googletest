version: '{build}-{branch}'

os: Visual Studio 2019

install:
    - wsl sudo sed --in-place 's/focal/groovy/g' /etc/apt/sources.list
    - wsl sudo apt update
    - wsl sudo apt install -y g++
    - git submodule update --init --depth 1

build: off

build_script:
    - msbuild /t:Build /p:Configuration=Release "./googletest.sln" -maxcpucount
    - msbuild /t:Build /p:Configuration=WSL_Release "./googletest.sln" -maxcpucount
